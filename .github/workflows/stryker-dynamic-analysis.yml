name: Dynamic Analysis - Stryker

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  stryker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run Stryker dynamic analysis
        run: ./scripts/run-stryker-check.sh

      - name: Upload Stryker artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stryker-dynamic-analysis
          path: artifacts/dynamic-analysis/stryker/
